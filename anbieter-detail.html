    .hero-name { font-family:'Fraunces',serif; font-size:24px; font-weight:900; color:var(--cream); margin-bottom:6px; }
    .hero-meta { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .hero-loc { color:rgba(245,240,232,0.8); font-size:13px; }
    .hero-stars { color:var(--gold); font-size:14px; font-weight:600; }
    .hero-reviews { color:rgba(245,240,232,0.65); font-size:13px; }

    .stat-val { font-family:'Fraunces',serif; font-size:20px; font-weight:700; color:var(--gold); }

    .chip.gold { background:rgba(200,146,42,.12); border-color:rgba(200,146,42,.3); color:var(--gold); }

    .about-text { font-size:14px; line-height:1.7; color:rgba(26,18,8,.8); }

    .offer-list { display:flex; flex-direction:column; gap:12px; }
    .offer-item { border:1.5px solid rgba(26,18,8,.1); border-radius:12px; padding:16px; }
    .offer-item.featured { border-color:var(--gold); }
    .offer-item.featured::after { content:'Empfohlen'; float:right; background:var(--gold); color:var(--dark); font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; margin-top:-2px; }
    .offer-name { font-weight:700; font-size:15px; margin-bottom:4px; }
    .offer-desc { font-size:13px; color:var(--muted); margin-bottom:10px; line-height:1.5; }

    .gallery-grid img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; }

    .review-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }

    .reviewer-name { font-weight:600; font-size:13px; }
    .reviewer-date { font-size:11px; color:var(--muted); }
    .review-stars { color:var(--gold); font-size:13px; }

    .response-bar p { font-size:13px; color:rgba(26,18,8,.75); }
    .response-bar strong { color:var(--dark); }

    .sticky-cta { position:fixed; bottom:0; left:0; right:0; background:#fff; padding:12px 20px; box-shadow:0 -4px 20px rgba(26,18,8,.12); display:flex; align-items:center; gap:12px; z-index:90; }

    .cta-price { font-family:'Fraunces',serif; font-size:22px; font-weight:700; }
    .cta-price-sub { font-size:11px; color:var(--muted); }
    .cta-btn { background:var(--gold); color:var(--dark); border:none; border-radius:10px; padding:13px 24px; font-size:15px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; display:inline-block; }

// Update sticky CTA
document.getElementById('cta-price').innerHTML = p.ctaPrice + ' <span style="font-size:14px;font-weight:400;color:var(--muted);font-family:\'DM Sans\',sans-serif;">' + p.ctaUnit + '</span>';
document.getElementById('cta-sub').textContent = p.ctaSub;

// Render page
const offersHTML = p.offers.map(o => `
  <div class="offer-item${o.featured ? ' featured' : ''}">
    <div class="offer-name">${o.name}</div>
    <div class="offer-desc">${o.desc}</div>
    <ul class="offer-includes">${o.items.map(i => `<li>${i}</li>`).join('')}</ul>
    <div class="offer-footer">
      <div class="offer-price">${o.price} <span>${o.unit}</span></div>
      <a href="anfrage-stellen.html" class="offer-btn">Anfragen</a>
    </div>
  </div>`).join('');

const galleryHTML = p.gallery.map(src => `<img src="${src}" alt="Bild" />`).join('');

const reviewsHTML = p.reviewList.map(r => `
  <div class="review">
    <div class="review-header">
      <div class="reviewer">
        <img class="reviewer-avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=68&h=68&fit=crop" alt="${r.name}" />
        <div><div class="reviewer-name">${r.name}</div><div class="reviewer-date">${r.date}</div></div>
      </div>
      <div class="review-stars">${r.stars}</div>
    </div>
    <p class="review-text">${r.text}</p>
  </div>`).join('');

const availHTML = p.avail.map(d => `<span class="avail-date">${d}</span>`).join('');
const statsHTML = p.stats.map(s => `<div class="stat-item"><div class="stat-val">${s.val}</div><div class="stat-label">${s.lbl}</div></div>`).join('');
const chipsHTML = p.chips.map((c,i) => `<span class="chip${i===p.chips.length-1?' gold':''}">${c}</span>`).join('');

document.getElementById('page-content').innerHTML = `
  <div class="hero">
    <img src="${p.img}" alt="${p.name}" />
    <div class="hero-overlay"></div>
    <span class="hero-tag">${p.tag}</span>
    <button class="hero-fav" onclick="this.textContent=this.textContent==='🤍'?'❤️':'🤍'">🤍</button>
    <div class="hero-content">
      <div class="hero-name">${p.name}</div>
      <div class="hero-meta">
        <div class="hero-loc">${p.loc}</div>
        <div class="hero-stars">${p.stars}</div>
        <div class="hero-reviews">${p.rating} (${p.reviews} Bewertungen)</div>
      </div>
    </div>
  </div>
  <div class="quick-stats">${statsHTML}</div>
  <div class="section">
    <div class="section-title">📋 Über diesen Anbieter</div>
    <p class="about-text">${p.about}</p>
    <div style="margin-top:14px;"><div class="chip-row">${chipsHTML}</div></div>
    <div class="response-bar"><span style="font-size:20px;">⚡</span><p>${p.responseNote}</p></div>
  </div>
  <div class="section">
    <div class="section-title">📅 Verfügbarkeit</div>
    <div class="avail-dates">${availHTML}</div>
  </div>
  <div class="section">
    <div class="section-title">💼 Angebote & Preise</div>
    <div class="offer-list">${offersHTML}</div>
    <p style="font-size:12px;color:var(--muted);margin-top:12px;">* Individuelle Anfragen und Sonderwünsche gerne auf Anfrage.</p>
  </div>
  <div class="section">
    <div class="section-title">📸 Impressionen</div>
    <div class="gallery-grid">${galleryHTML}</div>
  </div>
  <div class="section">
    <div class="section-title">⭐ Bewertungen</div>
    <div style="text-align:center;padding:14px;background:var(--cream);border-radius:10px;margin-bottom:16px;">
      <div style="font-family:'Fraunces',serif;font-size:40px;font-weight:900;color:var(--gold);line-height:1;">${p.rating}</div>
      <div style="color:var(--gold);font-size:16px;letter-spacing:2px;">${p.stars}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${p.reviews} Bewertungen</div>
    </div>
    <div class="reviews">${reviewsHTML}</div>
  </div>`;
</script>

</body>
